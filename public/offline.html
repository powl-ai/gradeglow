<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7c3aed" />
    <title>GradeGlow offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbf7ff;
        color: #0f172a;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(217, 70, 239, 0.25), transparent 34%),
          radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.18), transparent 30%),
          #fbf7ff;
      }
      main {
        max-width: 560px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 80px rgba(76, 29, 149, 0.18);
        padding: 32px;
        border: 1px solid rgba(167, 139, 250, 0.35);
        backdrop-filter: blur(18px);
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #7c3aed, #d946ef, #ec4899);
        color: white;
        font-weight: 950;
        letter-spacing: -0.08em;
        box-shadow: 0 20px 50px rgba(124, 58, 237, 0.32);
      }
      h1 {
        margin: 0;
        font-size: clamp(32px, 7vw, 52px);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }
      p {
        margin: 18px 0 0;
        color: #64748b;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        margin-top: 24px;
        border-radius: 18px;
        padding: 14px 18px;
        background: #0f172a;
        color: white;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">GG</div>
      <h1>GradeGlow ist gerade offline.</h1>
      <p>
        Die App-Dateien sind gespeichert. Verbinde dich wieder mit dem Internet,
        damit Login und Cloud-Sync weiterlaufen können.
      </p>
      <a href="/">Erneut versuchen</a>
    </main>
  </body>
</html>
